<!DOCTYPE html>
<html>
<head>
    <title>CryptoClash Event Flow Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #00ff00; }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        .warn { color: #ffaa00; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #logs { max-height: 400px; overflow-y: auto; background: #000; padding: 10px; }
    </style>
</head>
<body>
    <h1>🔍 CryptoClash Event Pop-up Debug Test</h1>
    
    <div class="section">
        <h2>1. Server Status</h2>
        <button onclick="checkServer()">Check Server Health</button>
        <div id="serverStatus"></div>
    </div>

    <div class="section">
        <h2>2. Socket.IO Connection</h2>
        <button onclick="testSocket()">Test Socket Connection</button>
        <div id="socketStatus"></div>
    </div>

    <div class="section">
        <h2>3. Create Test Room</h2>
        <button onclick="createRoom()">Create Room</button>
        <div id="roomStatus"></div>
    </div>

    <div class="section">
        <h2>4. Trigger Event</h2>
        <button onclick="triggerEvent()">Trigger Event</button>
        <div id="eventStatus"></div>
    </div>

    <div class="section">
        <h2>Console Logs</h2>
        <div id="logs"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let roomCode = null;

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const color = type === 'pass' ? '#00ff00' : type === 'fail' ? '#ff0000' : type === 'warn' ? '#ffaa00' : '#ffffff';
            logs.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
            console.log(message);
        }

        async function checkServer() {
            log('Checking server health...', 'info');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                document.getElementById('serverStatus').innerHTML = `
                    <div class="pass">✅ Server is running</div>
                    <div>Connections: ${data.connections}</div>
                    <div>Rooms: ${data.rooms}</div>
                    <div>Uptime: ${data.uptime}s</div>
                `;
                log('✅ Server health check passed', 'pass');
            } catch (error) {
                document.getElementById('serverStatus').innerHTML = `<div class="fail">❌ Server not responding: ${error.message}</div>`;
                log('❌ Server health check failed: ' + error.message, 'fail');
            }
        }

        function testSocket() {
            log('Testing Socket.IO connection...', 'info');
            
            if (socket) {
                socket.disconnect();
            }

            socket = io('http://localhost:3000', {
                path: '/socket.io',
                transports: ['polling', 'websocket'],
                timeout: 10000
            });

            socket.on('connect', () => {
                document.getElementById('socketStatus').innerHTML = `
                    <div class="pass">✅ Socket connected</div>
                    <div>Socket ID: ${socket.id}</div>
                `;
                log('✅ Socket.IO connected: ' + socket.id, 'pass');
            });

            socket.on('connect_error', (error) => {
                document.getElementById('socketStatus').innerHTML = `<div class="fail">❌ Connection error: ${error.message}</div>`;
                log('❌ Socket.IO connection error: ' + error.message, 'fail');
            });

            socket.on('disconnect', () => {
                log('⚠️ Socket disconnected', 'warn');
            });

            // Listen for scanData:update
            socket.on('scanData:update', (data) => {
                log('📡 Received scanData:update', 'info');
                log(`  - Auto scans: ${data.autoScanActions?.length || 0}`, 'info');
                log(`  - Player scans: ${data.playerScanActions?.length || 0}`, 'info');
                log(`  - Upcoming events: ${data.upcomingEvents?.length || 0}`, 'info');
                log(`  - Scan count: ${data.scanCount || 0}`, 'info');
                
                if (data.upcomingEvents && data.upcomingEvents.length > 0) {
                    log('📋 Upcoming events:', 'pass');
                    data.upcomingEvents.forEach((evt, i) => {
                        log(`  ${i+1}. ${evt.symbol || 'Market'} ${evt.percentage > 0 ? '+' : ''}${evt.percentage}% - ${evt.headline || evt.message || 'No headline'}`, 'info');
                    });
                }

                if (data.playerScanActions && data.playerScanActions.length > 0) {
                    const latest = data.playerScanActions[0];
                    log('🎲 Latest player event:', 'pass');
                    log(`  - Action: ${latest.action}`, 'info');
                    log(`  - Effect: ${latest.effect}`, 'info');
                    log(`  - Symbol: ${latest.cryptoSymbol || 'N/A'}`, 'info');
                    log(`  - Percentage: ${latest.percentageValue || 'N/A'}`, 'info');
                    log(`  - Headline: ${latest.headline || 'NO HEADLINE!'}`, latest.headline ? 'pass' : 'fail');
                }
            });
        }

        function createRoom() {
            if (!socket || !socket.connected) {
                log('❌ Socket not connected. Test socket first!', 'fail');
                return;
            }

            roomCode = 'TEST' + Math.random().toString(36).substr(2, 4).toUpperCase();
            log(`Creating room: ${roomCode}`, 'info');

            socket.emit('host:createRoom', {
                roomCode: roomCode,
                hostName: 'TestHost',
                hostAvatar: '🧪',
                settings: {
                    volatility: 'medium',
                    gameDuration: 30,
                    startingCash: 10000
                }
            });

            socket.on('host:createSuccess', ({ roomCode: code, room }) => {
                document.getElementById('roomStatus').innerHTML = `
                    <div class="pass">✅ Room created: ${code}</div>
                    <div>Players: ${Object.keys(room.players || {}).length}</div>
                `;
                log(`✅ Room created successfully: ${code}`, 'pass');
                log('⏳ Waiting for initial scanData:update with upcoming events...', 'info');
            });

            socket.on('host:createError', (error) => {
                document.getElementById('roomStatus').innerHTML = `<div class="fail">❌ Room creation error: ${error}</div>`;
                log('❌ Room creation failed: ' + error, 'fail');
            });
        }

        function triggerEvent() {
            if (!socket || !socket.connected) {
                log('❌ Socket not connected. Test socket first!', 'fail');
                return;
            }

            if (!roomCode) {
                log('❌ No room created. Create room first!', 'fail');
                return;
            }

            log('🎲 Triggering event...', 'info');

            socket.emit('player:triggerEvent', {
                roomCode: roomCode,
                playerName: 'TestHost',
                playerAvatar: '🧪'
            });

            document.getElementById('eventStatus').innerHTML = `<div class="warn">⏳ Event triggered, waiting for response...</div>`;
            log('✅ player:triggerEvent emitted', 'pass');
            log('⏳ Waiting for scanData:update with event data...', 'info');
        }

        // Auto-check server on load
        window.onload = () => {
            log('🚀 Debug test page loaded', 'info');
            checkServer();
        };
    </script>
</body>
</html>
